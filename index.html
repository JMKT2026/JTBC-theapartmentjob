<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTBC 아파트 트루벨류 입주민 게시판</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #7a6548; min-height: 100vh; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }

  .admin-bar { background: #3d2b1a; padding: 8px 16px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
  .admin-status { font-size: 11px; color: #c8a96e; }
  .btn-admin-login { font-size: 11px; color: #c8a96e; background: none; border: 1px solid #c8a96e; padding: 4px 10px; border-radius: 3px; cursor: pointer; }

  .board-header { background: #5c4430; padding: 18px 16px 14px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #3d2b1a; }
  .board-title-main { color: #f5ead8; font-size: 16px; font-weight: 700; letter-spacing: 1px; margin-bottom: 2px; }
  .board-title-sub { color: #c8a96e; font-size: 11px; letter-spacing: 2px; }

  .board-body { padding: 14px 12px 100px; max-width: 480px; margin: 0 auto; }

  .notice-banner { background: #c8a96e; color: #3d2b1a; font-size: 11px; font-weight: 600; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; text-align: center; letter-spacing: 0.5px; }

  .post-card { background: #fffef9; border: 0.5px solid #d4c9a8; border-radius: 3px; padding: 12px 14px; margin-bottom: 8px; }
  .post-card.pinned { border-left: 3px solid #c8a96e; background: #fffdf4; }
  .pin-badge { display: inline-block; background: #c8a96e; color: #3d2b1a; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 2px; margin-bottom: 6px; letter-spacing: 0.5px; }
  .post-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .post-author { font-size: 12px; font-weight: 600; color: #3d2b1a; }
  .post-date { font-size: 10px; color: #9a8a76; }
  .post-content { font-size: 13px; color: #4a3c2d; line-height: 1.65; word-break: break-word; }

  .admin-actions { display: none; margin-top: 8px; gap: 6px; flex-wrap: wrap; }
  .admin-mode .admin-actions { display: flex; }
  .btn-admin { font-size: 10px; padding: 4px 10px; border-radius: 3px; cursor: pointer; border: none; font-weight: 500; }
  .btn-delete { background: #e8d4c8; color: #5c2e1a; }
  .btn-pin { background: #d4c8a8; color: #3d2b1a; }
  .btn-unpin { background: #c8d4a8; color: #2b3d1a; }

  .divider { border: none; border-top: 1px dashed #c8b89a; margin: 4px 0 12px; }

  .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
  .page-btn { width: 34px; height: 34px; border-radius: 4px; border: 1px solid #c8b89a; background: #fffef9; color: #5c4430; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .page-btn.active { background: #5c4430; color: #f5ead8; border-color: #5c4430; }
  .page-btn.nav { font-size: 16px; color: #8a7a66; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-info { text-align: center; font-size: 11px; color: #c8b89a; margin-top: 10px; }

  .fab { position: fixed; bottom: 24px; right: 20px; background: #5c4430; color: #f5ead8; font-size: 13px; font-weight: 600; padding: 13px 20px; border-radius: 28px; border: none; cursor: pointer; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: #faf6ee; width: 100%; max-width: 480px; border-radius: 16px 16px 0 0; padding: 20px 20px 40px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: #d4c9a8; border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 15px; font-weight: 700; color: #3d2b1a; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e8dfc8; }
  .field-label { font-size: 11px; font-weight: 600; color: #8a7a66; margin-bottom: 5px; letter-spacing: 0.5px; }
  .field-input { width: 100%; background: #fff; border: 1px solid #d4c9a8; border-radius: 4px; padding: 10px 12px; font-size: 14px; color: #3d2b1a; margin-bottom: 14px; font-family: inherit; outline: none; }
  .field-input:focus { border-color: #c8a96e; }
  textarea.field-input { height: 100px; resize: none; line-height: 1.6; }
  .char-count { font-size: 10px; color: #9a8a76; text-align: right; margin-top: -10px; margin-bottom: 14px; }
  .btn-submit { width: 100%; background: #5c4430; color: #f5ead8; font-size: 14px; font-weight: 700; padding: 13px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-submit:disabled { background: #b0a090; cursor: not-allowed; }

  .admin-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400; align-items: center; justify-content: center; padding: 20px; }
  .admin-modal-overlay.open { display: flex; }
  .admin-modal { background: #faf6ee; border-radius: 10px; padding: 24px 20px; width: 100%; max-width: 300px; }
  .admin-modal h3 { font-size: 14px; font-weight: 700; color: #3d2b1a; margin-bottom: 14px; }
  .admin-modal-btns { display: flex; gap: 8px; margin-top: 14px; }
  .btn-cancel { flex: 1; background: #e8dfc8; color: #5c4430; border: none; padding: 10px; border-radius: 5px; font-size: 13px; cursor: pointer; }
  .btn-confirm { flex: 1; background: #5c4430; color: #f5ead8; border: none; padding: 10px; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; }

  .empty-state { text-align: center; padding: 40px 20px; color: #c8b89a; font-size: 13px; line-height: 2; }
  .loading { text-align: center; padding: 30px; color: #c8b89a; font-size: 13px; }
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ════════════════════════════════════════════
// ★★★ 여기에 Firebase 설정값을 붙여넣으세요 ★★★
// ════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDQ484DNZXGsnKwakLDaOBBYsWa9dvxGxQ",
  authDomain: "jtbc-theapartmentjob.firebaseapp.com",
  projectId: "jtbc-theapartmentjob",
  storageBucket: "jtbc-theapartmentjob.firebasestorage.app",
  messagingSenderId: "434931831365",
  appId: "1:434931831365:web:2edc560b11d8fd07b3492c"
};

// ════════════════════════════════════════════
// ★★★ 관리자 비밀번호를 변경하세요 ★★★
// ════════════════════════════════════════════
const ADMIN_PASSWORD = "jmkt2026apt";


const POSTS_PER_PAGE = 10;
const MAX_PINNED = 3;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const postsRef = collection(db, "posts");

let isAdmin = false;
let currentNickname = "";
let allPosts = [];      // Firestore에서 받은 원본 전체 (수정 금지)
let currentPage = 1;

// DOM
const boardBody = document.getElementById("boardBody");
const modalOverlay = document.getElementById("modalOverlay");
const inputNickname = document.getElementById("inputNickname");
const inputContent = document.getElementById("inputContent");
const charCount = document.getElementById("charCount");
const submitBtn = document.getElementById("submitBtn");
const adminLoginBtn = document.getElementById("adminLoginBtn");
const adminLogoutBtn = document.getElementById("adminLogoutBtn");
const adminStatus = document.getElementById("adminStatus");
const adminModalOverlay = document.getElementById("adminModalOverlay");
const adminPasswordInput = document.getElementById("adminPasswordInput");

function formatDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function esc(t) {
  return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function cardHtml(post) {
  const pinned = post.pinned === true;
  return `<div class="post-card${pinned?' pinned':''}" data-id="${post.id}">
    ${pinned ? '<span class="pin-badge">공지 고정</span>' : ''}
    <div class="post-meta">
      <span class="post-author">${esc(post.author)}</span>
      <span class="post-date">${formatDate(post.createdAt)}</span>
    </div>
    <div class="post-content">${esc(post.content).replace(/\n/g,'<br>')}</div>
    <div class="admin-actions">
      ${pinned
        ? `<button class="btn-admin btn-unpin" onclick="window.__unpin('${post.id}')">고정 해제</button>`
        : `<button class="btn-admin btn-pin"   onclick="window.__pin('${post.id}')">상단 고정</button>`
      }
      <button class="btn-admin btn-delete" onclick="window.__del('${post.id}')">삭제</button>
    </div>
  </div>`;
}

function renderPage() {
  // pinned: true인 것만 따로, 나머지는 최신순
  const pinned  = allPosts.filter(p => p.pinned === true)
                          .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
  const normal  = allPosts.filter(p => p.pinned !== true)
                          .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

  const totalPages = Math.max(1, Math.ceil(normal.length / POSTS_PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;

  const slice = normal.slice((currentPage-1)*POSTS_PER_PAGE, currentPage*POSTS_PER_PAGE);

  let html = `<div class="notice-banner">JTBC &lt;아파트&gt; 공식 입주민 커뮤니티</div>`;

  if (pinned.length) {
    pinned.forEach(p => { html += cardHtml(p); });
    html += `<hr class="divider">`;
  }

  if (!slice.length && !pinned.length) {
    html += `<div class="empty-state">아직 게시물이 없습니다.<br>첫 번째 감상평을 남겨보세요!</div>`;
  } else {
    slice.forEach(p => { html += cardHtml(p); });
  }

  if (totalPages > 1) {
    html += `<div class="pagination">
      <button class="page-btn nav" onclick="window.__go(${currentPage-1})" ${currentPage===1?'disabled':''}>&#8249;</button>`;
    const WING = 2;
    let start = Math.max(1, currentPage - WING);
    let end   = Math.min(totalPages, currentPage + WING);
    if (currentPage - WING < 1) end   = Math.min(totalPages, end + (WING - currentPage + 1));
    if (currentPage + WING > totalPages) start = Math.max(1, start - (currentPage + WING - totalPages));
    if (start > 1) {
      html += `<button class="page-btn" onclick="window.__go(1)">1</button>`;
      if (start > 2) html += `<span style="color:#9a8a76;font-size:13px;padding:0 2px;">…</span>`;
    }
    for (let i=start; i<=end; i++) {
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="window.__go(${i})">${i}</button>`;
    }
    if (end < totalPages) {
      if (end < totalPages - 1) html += `<span style="color:#9a8a76;font-size:13px;padding:0 2px;">…</span>`;
      html += `<button class="page-btn" onclick="window.__go(${totalPages})">${totalPages}</button>`;
    }
    html += `<button class="page-btn nav" onclick="window.__go(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&#8250;</button>
    </div><div class="page-info">${currentPage} / ${totalPages} 페이지</div>`;
  }

  boardBody.innerHTML = html;
  if (isAdmin) document.body.classList.add("admin-mode");
}

// 전역 핸들러
window.__go = (p) => {
  const normal = allPosts.filter(x => x.pinned !== true);
  const total = Math.max(1, Math.ceil(normal.length / POSTS_PER_PAGE));
  if (p < 1 || p > total) return;
  currentPage = p;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.__del = async (id) => {
  if (!isAdmin || !confirm("삭제하시겠습니까?")) return;
  await deleteDoc(doc(db, "posts", id));
};

window.__pin = async (id) => {
  if (!isAdmin) return;
  const cnt = allPosts.filter(p => p.pinned === true).length;
  if (cnt >= MAX_PINNED) {
    alert(`상단 고정은 최대 ${MAX_PINNED}개까지 가능합니다.\n기존 고정 게시물을 먼저 해제해주세요.`);
    return;
  }
  // 로컬 상태 즉시 반영 (낙관적 업데이트) → Firestore 쓰기
  allPosts = allPosts.map(p => p.id === id ? {...p, pinned: true} : p);
  renderPage();
  await updateDoc(doc(db, "posts", id), { pinned: true });
};

window.__unpin = async (id) => {
  if (!isAdmin) return;
  allPosts = allPosts.map(p => p.id === id ? {...p, pinned: false} : p);
  renderPage();
  await updateDoc(doc(db, "posts", id), { pinned: false });
};

// Firestore 실시간 리스닝 — orderBy 없이 받아서 JS에서 정렬
function listenPosts() {
  boardBody.innerHTML = '<div class="loading">게시판을 불러오는 중...</div>';
  onSnapshot(postsRef, (snapshot) => {
    allPosts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPage();
  }, () => {
    boardBody.innerHTML = '<div class="empty-state">게시판을 불러오지 못했습니다.<br>Firebase 설정을 확인해주세요.</div>';
  });
}

// 게시물 등록
submitBtn.addEventListener("click", async () => {
  const nickname = inputNickname.value.trim();
  const content  = inputContent.value.trim();
  if (!nickname) { alert("닉네임을 입력해주세요."); inputNickname.focus(); return; }
  if (!content)  { alert("내용을 입력해주세요."); inputContent.focus(); return; }
  if (content.length > 500) { alert("500자 이내로 작성해주세요."); return; }
  submitBtn.disabled = true;
  submitBtn.textContent = "등록 중...";
  try {
    await addDoc(postsRef, { author: nickname, content, createdAt: serverTimestamp(), pinned: false });
    currentNickname = nickname;
    inputContent.value = "";
    charCount.textContent = "0 / 500";
    currentPage = 1;
    closeModal();
  } catch { alert("등록에 실패했습니다. 잠시 후 다시 시도해주세요."); }
  submitBtn.disabled = false;
  submitBtn.textContent = "등록하기";
});

// 관리자 로그인
adminLoginBtn.addEventListener("click", () => {
  adminPasswordInput.value = "";
  adminModalOverlay.classList.add("open");
  setTimeout(() => adminPasswordInput.focus(), 100);
});
document.getElementById("adminConfirmBtn").addEventListener("click", () => {
  if (adminPasswordInput.value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.body.classList.add("admin-mode");
    adminStatus.textContent = "관리자 모드";
    adminLoginBtn.style.display = "none";
    adminLogoutBtn.style.display = "inline-block";
    adminModalOverlay.classList.remove("open");
    renderPage();
  } else {
    alert("비밀번호가 올바르지 않습니다.");
    adminPasswordInput.value = "";
    adminPasswordInput.focus();
  }
});
document.getElementById("adminCancelBtn").addEventListener("click", () => adminModalOverlay.classList.remove("open"));
adminPasswordInput.addEventListener("keydown", e => { if (e.key==="Enter") document.getElementById("adminConfirmBtn").click(); });
adminLogoutBtn.addEventListener("click", () => {
  isAdmin = false;
  document.body.classList.remove("admin-mode");
  adminStatus.textContent = "";
  adminLoginBtn.style.display = "inline-block";
  adminLogoutBtn.style.display = "none";
  renderPage();
});

// 작성 모달
document.getElementById("fabBtn").addEventListener("click", () => {
  if (currentNickname) inputNickname.value = currentNickname;
  modalOverlay.classList.add("open");
  setTimeout(() => inputNickname.focus(), 300);
});
function closeModal() { modalOverlay.classList.remove("open"); }
modalOverlay.addEventListener("click", e => { if (e.target===modalOverlay) closeModal(); });
document.getElementById("closeModal").addEventListener("click", closeModal);
inputContent.addEventListener("input", () => { charCount.textContent = `${inputContent.value.length} / 500`; });

listenPosts();
</script>

<div class="admin-bar">
  <span class="admin-status" id="adminStatus"></span>
  <button class="btn-admin-login" id="adminLoginBtn">관리자</button>
  <button class="btn-admin-login" id="adminLogoutBtn" style="display:none;">로그아웃</button>
</div>

<div class="board-header">
  <div class="board-title-main">트루벨류 입주민 게시판</div>
  <div class="board-title-sub">TRUEVILLE RESIDENTS' BOARD</div>
</div>

<div class="board-body" id="boardBody">
  <div class="loading">게시판을 불러오는 중...</div>
</div>

<button class="fab" id="fabBtn">게시물 작성하기 +</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">게시물 작성하기</div>
    <div class="field-label">닉네임</div>
    <input type="text" class="field-input" id="inputNickname" placeholder="예) 101동 주민" maxlength="20">
    <div class="field-label">내용</div>
    <textarea class="field-input" id="inputContent" placeholder="감상평을 자유롭게 남겨주세요 :)" maxlength="500"></textarea>
    <div class="char-count" id="charCount">0 / 500</div>
    <button class="btn-submit" id="submitBtn">등록하기</button>
    <button id="closeModal" style="width:100%;background:none;border:none;padding:12px;color:#9a8a76;font-size:13px;cursor:pointer;margin-top:6px;">닫기</button>
  </div>
</div>

<div class="admin-modal-overlay" id="adminModalOverlay">
  <div class="admin-modal">
    <h3>관리자 로그인</h3>
    <div class="field-label">비밀번호</div>
    <input type="password" class="field-input" id="adminPasswordInput" placeholder="비밀번호 입력">
    <div class="admin-modal-btns">
      <button class="btn-cancel" id="adminCancelBtn">취소</button>
      <button class="btn-confirm" id="adminConfirmBtn">확인</button>
    </div>
  </div>
</div>

</body>
</html>
